<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Ready Wardrobe</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Weather Ready Wardrobe App</h1>
    </header>

    <!-- Search area -->
    <div id="search_input">
        <input type="text" id="city_name" placeholder="Enter a city">
        <button id="search_button">Search</button>
    </div>

    <div id="tone-selector">
        <label for="">Choose your style:</label>
        <label for="fun"><input type="radio" id="fun" name="tone" value="fun" checked>Fun</label>
        <label for="formal"><input type="radio" id="formal" name="tone" value="formal">Formal</label>
        <label for="minimal"><input type="radio" id="minimal" name="tone" value="minimal">Minimal</label>
    </div>

    <h2 id="loading">Fetching weather...</h2>

    <div id="error-message"></div>

    <div id="results-card">
        <p style="display: none;" id="weather_icon"></p>
        <p id="city-name"></p>
        <div>
            <p id="temperature"></p>
            <button id="toggle-button">Switch to °F</button>
        </div>
        <p id="weather-description"></p>
        <p id="humidity"></p>
        <p id="wind-speed"></p>
        <p id="outfit-recommendation"></p>
    </div>
    <script src="app.js"></script>
</body>
</html>
